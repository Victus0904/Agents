services:
  multimodal-rag:
    build:
      context: .
    image: multimodal-rag:latest
    env_file:
      - .env
    environment:
      CHROMA_PATH: /app/chroma_db
      PORT: "8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    working_dir: /app
